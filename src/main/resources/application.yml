spring:
  application:
    name: codoc
  jackson:
    time-zone: Asia/Seoul
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration


  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}

    open-in-view: false

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      repositories:
        enabled: false

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl-minutes: 15
  refresh-token-ttl-days: 7
  cookie-secure: ${JWT_COOKIE_SECURE:true}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI}
  admin-key: ${KAKAO_ADMIN_KEY:}
  scope: ${KAKAO_SCOPE:}

app:
  cache:
    caffeine:
      default-spec: ${APP_CACHE_CAFFEINE_DEFAULT_SPEC:maximumSize=2000,expireAfterWrite=6h,recordStats}
      default-negative-spec: ${APP_CACHE_CAFFEINE_DEFAULT_NEGATIVE_SPEC:maximumSize=2000,expireAfterWrite=1h,recordStats}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  storage:
    bucket:
      images: ${APP_STORAGE_BUCKET_IMAGES:}
  ai-server:
    base-url: ${APP_AI_SERVER_BASE_URL:http://localhost:8000}
    base-timeout: 3s
    chatbot-stream-timeout: ${APP_AI_CHATBOT_STREAM_TIMEOUT:1m}
  analysis-server:
    base-url: ${APP_ANALYSIS_SERVER_BASE_URL:http://localhost:8010}
    base-timeout: 60s
    recommend-timeout: 60s

  problem-session:
    ttl: 30m

  chat:
    max-participants: ${CHAT_ROOM_MAX_PARTICIPANT:100}
    ws:
      session-ttl: ${APP_CHAT_WS_SESSION_TTL:90s}
      presence-ttl: ${APP_CHAT_WS_PRESENCE_TTL:120s}
      heartbeat-interval: ${APP_CHAT_WS_HEARTBEAT_INTERVAL:20s}
      heartbeat-enabled: ${APP_CHAT_WS_HEARTBEAT_ENABLED:true}
      relay-enabled: ${APP_CHAT_WS_RELAY_ENABLED:true}
      relay-channel: ${APP_CHAT_WS_RELAY_CHANNEL:chat.ws.relay}
      server-id: ${APP_CHAT_WS_SERVER_ID:${HOSTNAME:local}}

  leaderboard:
    redis:
      write-enabled: ${APP_LEADERBOARD_REDIS_WRITE_ENABLED:false}
      read-enabled: ${APP_LEADERBOARD_REDIS_READ_ENABLED:false}
      rebuild-batch-size: ${APP_LEADERBOARD_REDIS_REBUILD_BATCH_SIZE:500}

  fcm:
    enabled: ${APP_FCM_ENABLED:false}
    project-id: ${FCM_PROJECT_ID:}

  custom-problem:
    max-upload-image-count: ${APP_CUSTOM_PROBLEM_MAX_UPLOAD_IMAGE_COUNT:4}
    max-upload-image-size-bytes: ${APP_CUSTOM_PROBLEM_MAX_UPLOAD_IMAGE_SIZE_BYTES:10485760}
    upload-url-expiration: ${APP_CUSTOM_PROBLEM_UPLOAD_URL_EXPIRATION:10m}
    download-url-expiration: ${APP_CUSTOM_PROBLEM_DOWNLOAD_URL_EXPIRATION:30m}
    async:
      core-pool-size: ${APP_CUSTOM_PROBLEM_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${APP_CUSTOM_PROBLEM_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${APP_CUSTOM_PROBLEM_ASYNC_QUEUE_CAPACITY:50}
      thread-name-prefix: ${APP_CUSTOM_PROBLEM_ASYNC_THREAD_NAME_PREFIX:custom-problem-}
    mq:
      enabled: ${APP_CUSTOM_PROBLEM_MQ_ENABLED:false}
      exchange: ${APP_CUSTOM_PROBLEM_MQ_EXCHANGE:custom.problem.exchange}
      request-queue: ${APP_CUSTOM_PROBLEM_MQ_REQUEST_QUEUE:custom.problem.request}
      response-queue: ${APP_CUSTOM_PROBLEM_MQ_RESPONSE_QUEUE:custom.problem.response}
      response-dlq: ${APP_CUSTOM_PROBLEM_MQ_RESPONSE_DLQ:custom.problem.response.dlq}

  notification:
    mq:
      enabled: ${APP_NOTIFICATION_MQ_ENABLED:false}
      exchange: ${APP_NOTIFICATION_MQ_EXCHANGE:notification.event}
      in-app-queue: ${APP_NOTIFICATION_MQ_INAPP_QUEUE:notification.inapp.q}
      in-app-dlq: ${APP_NOTIFICATION_MQ_INAPP_DLQ:notification.inapp.dlq.q}
      push-queue: ${APP_NOTIFICATION_MQ_PUSH_QUEUE:notification.push.q}
      push-dlq: ${APP_NOTIFICATION_MQ_PUSH_DLQ:notification.push.dlq.q}
      retry-max-attempts: ${APP_NOTIFICATION_MQ_RETRY_MAX_ATTEMPTS:3}
      retry-initial-interval-millis: ${APP_NOTIFICATION_MQ_RETRY_INITIAL_INTERVAL_MILLIS:1000}
      retry-multiplier: ${APP_NOTIFICATION_MQ_RETRY_MULTIPLIER:2.0}
      retry-max-interval-millis: ${APP_NOTIFICATION_MQ_RETRY_MAX_INTERVAL_MILLIS:5000}

  recommend:
    mq:
      enabled: ${APP_RECOMMEND_MQ_ENABLED:false}
      request-publish-enabled: ${APP_RECOMMEND_MQ_REQUEST_PUBLISH_ENABLED:false}
      response-consume-enabled: ${APP_RECOMMEND_MQ_RESPONSE_CONSUME_ENABLED:false}
      exchange: ${APP_RECOMMEND_MQ_EXCHANGE:codoc.recommend.exchange}
      request-queue: ${APP_RECOMMEND_MQ_REQUEST_QUEUE:recommend.request.q}
      response-queue: ${APP_RECOMMEND_MQ_RESPONSE_QUEUE:recommend.response.q}
      request-routing-key: ${APP_RECOMMEND_MQ_REQUEST_ROUTING_KEY:recommend.request}
      response-routing-key: ${APP_RECOMMEND_MQ_RESPONSE_ROUTING_KEY:recommend.response}

  report:
    mq:
      enabled: ${APP_REPORT_MQ_ENABLED:false}
      request-publish-enabled: ${APP_REPORT_MQ_REQUEST_PUBLISH_ENABLED:false}
      response-consume-enabled: ${APP_REPORT_MQ_RESPONSE_CONSUME_ENABLED:false}
      exchange: ${APP_REPORT_MQ_EXCHANGE:codoc.report.exchange}
      request-queue: ${APP_REPORT_MQ_REQUEST_QUEUE:report.request.q}
      response-queue: ${APP_REPORT_MQ_RESPONSE_QUEUE:report.response.q}
      request-routing-key: ${APP_REPORT_MQ_REQUEST_ROUTING_KEY:report.request}
      response-routing-key: ${APP_REPORT_MQ_RESPONSE_ROUTING_KEY:report.response}

  rate-limit:
    chatbot-stream:
      enabled: ${RATE_LIMIT_CHATBOT_STREAM_ENABLED:true}
      limit: ${RATE_LIMIT_CHATBOT_STREAM_LIMIT:5}
      period: ${RATE_LIMIT_CHATBOT_STREAM_PERIOD:10s}
      consume-token: ${RATE_LIMIT_CHATBOT_STREAM_CONSUME:1}
    custom-problem-generate:
      enabled: ${RATE_LIMIT_CUSTOM_PROBLEM_GENERATE_ENABLED:true}
      limit: ${RATE_LIMIT_CUSTOM_PROBLEM_GENERATE_LIMIT:3}
      period: ${RATE_LIMIT_CUSTOM_PROBLEM_GENERATE_PERIOD:1m}
      consume-token: ${RATE_LIMIT_CUSTOM_PROBLEM_GENERATE_CONSUME:1}
    global:
      enabled: ${RATE_LIMIT_GLOBAL_ENABLED:true}
      limit: ${RATE_LIMIT_GLOBAL_LIMIT:100}
      period: ${RATE_LIMIT_GLOBAL_PERIOD:10s}
      consume-token: ${RATE_LIMIT_GLOBAL_CONSUME:1}

  schedule:
    time-zone: ${APP_SCHEDULE_TIME_ZONE:Asia/Seoul}
    analysis-report-cron: ${APP_SCHEDULE_ANALYSIS_REPORT_CRON:0 0 8 * * MON}
    recommended-problem-cron: ${APP_SCHEDULE_RECOMMENDED_PROBLEM_CRON:0 0 3 * * *}
    attendance-notification-cron: ${APP_SCHEDULE_ATTENDANCE_NOTIFICATION_CRON:0 0 12 * * *}
    quest-daily-cron: ${APP_SCHEDULE_QUEST_DAILY_CRON:0 0 2 * * *}
    user-dormant-cron: ${APP_SCHEDULE_USER_DORMANT_CRON:0 0 1 * * *}
    leaderboard-hourly-snapshot-cron: ${APP_SCHEDULE_LEADERBOARD_HOURLY_SNAPSHOT_CRON:0 0 * * * *}
    leaderboard-season-start-snapshot-cron: ${APP_SCHEDULE_LEADERBOARD_SEASON_START_SNAPSHOT_CRON:0 0 0 * * TUE}
    leaderboard-season-end-snapshot-cron: ${APP_SCHEDULE_LEADERBOARD_SEASON_END_SNAPSHOT_CRON:0 0 0 * * MON}
    leaderboard-league-adjustment-cron: ${APP_SCHEDULE_LEADERBOARD_LEAGUE_ADJUSTMENT_CRON:0 0 4 * * MON}
    leaderboard-season-assign-cron: ${APP_SCHEDULE_LEADERBOARD_SEASON_ASSIGN_CRON:0 0 10 * * MON}
    leaderboard-redis-rebuild-cron: ${APP_SCHEDULE_LEADERBOARD_REDIS_REBUILD_CRON:0 */10 * * * *}
    chatbot-session-finish-fixed-rate: ${APP_SCHEDULE_CHATBOT_SESSION_FINISH_FIXED_RATE:600000}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  server-name: ${SENTRY_SERVER_NAME:unknown}
  release: ${SENTRY_RELEASE:codoc-be@}
  send-default-pii: ${SENTRY_SEND_DEFAULT_PII:false}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  profile-session-sample-rate: ${SENTRY_PROFILE_SESSION_SAMPLE_RATE:0.0}
  profile-lifecycle: ${SENTRY_PROFILE_LIFECYCLE:MANUAL}
  logs:
    enabled: ${SENTRY_LOGS_ENABLED:false}

management:
  endpoints:
      access:
        default: none

springdoc:
  swagger-ui:
    try-it-out-enabled: false
    supported-submit-methods: []
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
    enabled: false
  api-docs:
    path: ${SWAGGER_API_DOCS_PATH:/v3/api-docs}
    enabled: false

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - loadtest=%X{loadtest} %msg%n"

aws:
  region: ${AWS_REGION:ap-northeast-2}
